version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: iran_news
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./db/irans_news_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/data.sql:/docker-entrypoint-initdb.d/02_data.sql

  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
